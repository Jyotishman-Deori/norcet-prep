<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS standalone hints. The manifest is injected by vite-plugin-pwa. -->
    <meta name="theme-color" content="#0F4C4C" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15130F" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NurseHolic" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0F4C4C" />

    <!-- Preconnect to Google Fonts so the very first paint can grab them quickly
         on a cold load. The service worker caches them after that. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>NurseHolic™: AIIMS NORCET Prep</title>
    <meta name="description" content="NurseHolic™: free AIIMS NORCET preparation. Mock tests, PYQs, revision notes and dosage drills for nursing students." />

    <!-- Pre-paint theme, runs SYNCHRONOUSLY before React mounts (React is
         deferred behind i18n in main.jsx, so for up to ~1.5s only this HTML
         exists). A returning dark-theme user would otherwise see a cream frame
         and, on reload, the light loading screen. We set the <html> background
         from a localStorage hint the app writes on every theme change. New
         users have no hint and fall through to the CSS default (light). -->
    <script>
      (function () {
        try {
          var bg = localStorage.getItem('nh-bg');
          if (bg) document.documentElement.style.backgroundColor = bg;
        } catch (e) { /* private mode / disabled storage: use the CSS default */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
